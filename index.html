<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EliteEats - Premium Digital Menu</title>
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
<!-- Splash Screen / Hero Section -->
<section class="splash-screen" id="splashScreen">
<div class="splash-content">
<div class="logo-container">
<h1 class="restaurant-name">EliteEats</h1>
<p class="tagline">Taste Premium Excellence</p>
</div>
<button class="cta-button" id="viewMenuBtn">View Menu</button>
</div>
<div class="splash-background"></div>
</section>

<!-- Main Menu Section -->
<main class="menu-container">
<!-- Header with Cart Icon -->
<header class="menu-header">
<div class="brand">EliteEats</div>
<div class="cart-icon-wrapper" id="cartIconBtn">
<i class="fa-solid fa-cart-shopping"></i>
<span class="cart-count" id="cartCount">0</span>
</div>
</header>

<!-- Sticky Category Navigation -->
<nav class="category-nav">
<div class="category-nav-wrapper">
<button class="category-btn active" data-category="all">All</button>
<button class="category-btn" data-category="burgers">Burgers</button>
<button class="category-btn" data-category="pizza">Pizza</button>
<button class="category-btn" data-category="drinks">Drinks</button>
<button class="category-btn" data-category="desserts">Desserts</button>
</div>
</nav>

<!-- Menu Grid -->
<div class="menu-grid" id="menuGrid"></div>
</main>

<!-- Cart Sidebar -->
<div class="cart-sidebar" id="cartSidebar">
<div class="cart-header">
<h2>Your Order</h2>
<button class="close-cart" id="closeCartBtn"><i class="fa-solid fa-xmark"></i></button>
</div>
<div class="cart-items" id="cartItems">
<p class="empty-cart-msg">Your cart is empty</p>
</div>
<div class="cart-footer">
<div class="cart-total">
<span>Total:</span>
<span id="cartTotalValue">$0.00</span>
</div>
<button class="checkout-btn" id="checkoutBtn">Order Now <i class="fa-brands fa-whatsapp"></i></button>
</div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay"></div>

<!-- Image Zoom Modal -->
<div class="image-modal" id="imageModal">
<span class="close-image" id="closeImage">&times;</span>
<img class="image-modal-content" id="imageModalContent" />
</div>

<!-- Checkout Modal -->
<div class="modal" id="checkoutModal">
<div class="modal-content">
<span class="close-modal" id="closeModalBtn">&times;</span>
<h2>Complete Your Order</h2>
<form id="checkoutForm">
<div class="form-group">
<label>Name</label>
<input type="text" id="customerName" required placeholder="Your Name" />
</div>
<div class="form-group">
<label>Phone Number</label>
<input type="tel" id="customerPhone" required placeholder="01xxxxxxxxx" />
</div>
<div class="form-group">
<label>Delivery Address</label>
<textarea id="customerAddress" required placeholder="City, Street, Building No..."></textarea>
</div>
<button type="submit" class="confirm-order-btn">Confirm via WhatsApp <i class="fa-brands fa-whatsapp"></i></button>
</form>
</div>
</div>

<!-- Footer -->
<footer class="footer">
<p>&copy; 2024 EliteEats. All rights reserved.</p>
<p>📍 Order Now | 🚀 Fast Delivery</p>
</footer>

<script src="script.js"></script>
</body>
</html>
